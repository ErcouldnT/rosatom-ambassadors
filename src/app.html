<!doctype html>
<html lang="%lang%">

<head>
	<meta charset="utf-8" />
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=3" />
	<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png?v=3" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	%sveltekit.head%
	<script defer src="https://umami.erkut.dev/script.js"
		data-website-id="6f4559ca-77b0-4af7-89da-461b5dddc8c7"></script>
	<script>
		// Immediate theme application to prevent flash
		const theme =
			localStorage.getItem('theme') ||
			(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'synthwave' : 'light');
		document.documentElement.setAttribute('data-theme', theme);
	</script>
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
